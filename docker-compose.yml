services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.6
    container_name: zookeeper
    hostname: zookeeper
    networks:
      - flight-net
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.9.6
    container_name: kafka
    hostname: kafka
    networks:
      - flight-net
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 40s
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.9.6
    container_name: kafka-init
    hostname: kafka-init
    networks:
      - flight-net
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "
      echo 'Creating Kafka topic: flight-events';
      kafka-topics --bootstrap-server kafka:9092
      --create
      --if-not-exists
      --topic flight-events
      --partitions 4
      --replication-factor 1;
      echo 'Kafka topic ready.';
      kafka-topics --bootstrap-server kafka:9092 --describe --topic flight-events;
      "
    restart: "no"

  hdfs-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-namenode
    hostname: hdfs-namenode
    networks:
      - flight-net
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      CLUSTER_NAME: flightcluster
      CORE_CONF_fs_defaultFS: hdfs://hdfs-namenode:9000
      CORE_CONF_hadoop_http_staticuser_user: root
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: "false"
    volumes:
      - hdfs_namenode:/hadoop/dfs/name
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9870/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 50s
    restart: unless-stopped

  hdfs-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-datanode
    hostname: hdfs-datanode
    networks:
      - flight-net
    depends_on:
      hdfs-namenode:
        condition: service_healthy
    ports:
      - "9864:9864"
    environment:
      CORE_CONF_fs_defaultFS: hdfs://hdfs-namenode:9000
      CORE_CONF_hadoop_http_staticuser_user: root
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_datanode_address: 0.0.0.0:9866
      HDFS_CONF_dfs_datanode_http_address: 0.0.0.0:9864
      SERVICE_PRECONDITION: "hdfs-namenode:9870"
    volumes:
      - hdfs_datanode:/hadoop/dfs/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9864/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 70s
    restart: unless-stopped

  spark-master:
    image: spark:3.5.8-python3
    container_name: spark-master
    hostname: spark-master
    networks:
      - flight-net
    depends_on:
      hdfs-namenode:
        condition: service_healthy
    ports:
      - "7077:7077"
      - "8080:8080"
      - "4040:4040"
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  spark-worker-1:
    image: spark:3.5.8-python3
    container_name: spark-worker-1
    hostname: spark-worker-1
    networks:
      - flight-net
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --webui-port
      - "8081"
      - spark://spark-master:7077
    environment:
      SPARK_WORKER_CORES: 4
      SPARK_WORKER_MEMORY: 4g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 40s
    restart: unless-stopped

  spark-worker-2:
    image: spark:3.5.8-python3
    container_name: spark-worker-2
    hostname: spark-worker-2
    networks:
      - flight-net
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8082:8082"
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --webui-port
      - "8082"
      - spark://spark-master:7077
    environment:
      SPARK_WORKER_CORES: 4
      SPARK_WORKER_MEMORY: 4g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 40s
    restart: unless-stopped

networks:
  flight-net:
    driver: bridge

volumes:
  hdfs_namenode:
  hdfs_datanode: