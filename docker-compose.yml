networks:
  flight-net:
    driver: bridge

volumes:
  kafka_data:
  hdfs_namenode:
  hdfs_datanode:

services:
  zookeeper:
    image: zookeeper:3.8
    container_name: zookeeper
    hostname: zookeeper
    networks:
      - flight-net
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    hostname: kafka
    networks:
      - flight-net
    ports:
      - "9092:9092"
      - "9093:9093"
    depends_on:
      - zookeeper
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9094,EXTERNAL://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.9.2
    container_name: kafka-init
    hostname: kafka-init
    networks:
      - flight-net
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      echo 'Creating Kafka topic: flight-events' &&
      /opt/kafka/bin/kafka-topics.sh
      --bootstrap-server kafka:9092
      --create
      --if-not-exists
      --topic flight-events
      --partitions 4
      --replication-factor 1
      --config retention.ms=86400000
      --config max.message.bytes=10485760 &&
      echo 'Topic created successfully.' &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --describe --topic flight-events
    restart: "no"

  hdfs-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-namenode
    hostname: hdfs-namenode
    networks:
      - flight-net
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      CLUSTER_NAME: flightcluster
      CORE_CONF_fs_defaultFS: hdfs://hdfs-namenode:9000
      CORE_CONF_hadoop_http_staticuser_user: root
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: "false"
    volumes:
      - hdfs_namenode:/hadoop/dfs/name
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9870/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  hdfs-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-datanode
    hostname: hdfs-datanode
    networks:
      - flight-net
    ports:
      - "9864:9864"
    depends_on:
      hdfs-namenode:
        condition: service_healthy
    environment:
      CORE_CONF_fs_defaultFS: hdfs://hdfs-namenode:9000
      CORE_CONF_hadoop_http_staticuser_user: root
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_datanode_address: 0.0.0.0:9866
      HDFS_CONF_dfs_datanode_http_address: 0.0.0.0:9864
      SERVICE_PRECONDITION: "hdfs-namenode:9870"
    volumes:
      - hdfs_datanode:/hadoop/dfs/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9864/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  spark-master:
    image: spark:3.5.8-python3
    container_name: spark-master
    hostname: spark-master
    networks:
      - flight-net
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - ./:/opt/project
    working_dir: /opt/project
    depends_on:
      hdfs-namenode:
        condition: service_healthy
      hdfs-datanode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  spark-worker-1:
    image: spark:3.5.8-python3
    container_name: spark-worker-1
    hostname: spark-worker-1
    networks:
      - flight-net
    ports:
      - "8081:8081"
    depends_on:
      spark-master:
        condition: service_healthy
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --webui-port 8081
      --cores 2
      --memory 2g
    volumes:
      - ./:/opt/project
    working_dir: /opt/project
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  spark-worker-2:
    image: spark:3.5.8-python3
    container_name: spark-worker-2
    hostname: spark-worker-2
    networks:
      - flight-net
    ports:
      - "8082:8082"
    depends_on:
      spark-master:
        condition: service_healthy
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --webui-port 8082
      --cores 2
      --memory 2g
    volumes:
      - ./:/opt/project
    working_dir: /opt/project
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped