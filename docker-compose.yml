networks:
  flight-net:
    driver: bridge

volumes:
  hdfs_namenode:
  hdfs_datanode:

services:

  # ─────────────────────────── Kafka (KRaft, no Zookeeper) ─────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    networks:
      - flight-net
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ──────────────────── Kafka Topic Init ───────────────────────────
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: kafka-init
    networks:
      - flight-net
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topic: flight-events"
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --create \
          --if-not-exists \
          --topic flight-events \
          --partitions 4 \
          --replication-factor 1
        echo "Topic created."
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --describe --topic flight-events
    restart: "no"

  # ─────────────────────── HDFS Namenode ───────────────────────────
  hdfs-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-namenode
    networks:
      - flight-net
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      CLUSTER_NAME: flightcluster
      CORE_CONF_fs_defaultFS: hdfs://hdfs-namenode:9000
      CORE_CONF_hadoop_http_staticuser_user: root
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: "false"
    volumes:
      - hdfs_namenode:/hadoop/dfs/name
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9870/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ─────────────────────── HDFS Datanode ───────────────────────────
  hdfs-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-datanode
    networks:
      - flight-net
    ports:
      - "9864:9864"
    depends_on:
      hdfs-namenode:
        condition: service_healthy
    environment:
      CORE_CONF_fs_defaultFS: hdfs://hdfs-namenode:9000
      CORE_CONF_hadoop_http_staticuser_user: root
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_datanode_address: 0.0.0.0:9866
      HDFS_CONF_dfs_datanode_http_address: 0.0.0.0:9864
      SERVICE_PRECONDITION: "hdfs-namenode:9870"
    volumes:
      - hdfs_datanode:/hadoop/dfs/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9864/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ─────────────────────── Spark Master ────────────────────────────
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    networks:
      - flight-net
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
      SPARK_CONF_DIR: /opt/spark/conf
    volumes:
      - ./src:/opt/spark-apps/src:ro
      - ./data:/opt/spark-apps/data:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─────────────────────── Spark Worker 1 ──────────────────────────
  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: spark-worker-1
    networks:
      - flight-net
    ports:
      - "8081:8081"
    depends_on:
      spark-master:
        condition: service_healthy
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_WORKER_CORES: "4"
      SPARK_WORKER_MEMORY: 4g
      SPARK_WORKER_WEBUI_PORT: "8081"
      SPARK_CONF_DIR: /opt/spark/conf
    volumes:
      - ./src:/opt/spark-apps/src:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────── Spark Worker 2 ──────────────────────────
  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: spark-worker-2
    networks:
      - flight-net
    ports:
      - "8082:8082"
    depends_on:
      spark-master:
        condition: service_healthy
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_WORKER_CORES: "4"
      SPARK_WORKER_MEMORY: 4g
      SPARK_WORKER_WEBUI_PORT: "8082"
      SPARK_CONF_DIR: /opt/spark/conf
    volumes:
      - ./src:/opt/spark-apps/src:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
