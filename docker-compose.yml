version: "3.8"

networks:
  flight-net:
    driver: bridge

volumes:
  zookeeper_data:
  kafka_data:
  hdfs_namenode:
  hdfs_datanode:

services:
  # ─────────────────────────── Zookeeper ───────────────────────────
  zookeeper:
    image: bitnami/zookeeper:3.8
    container_name: zookeeper
    networks:
      - flight-net
    ports:
      - "2181:2181"
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
      ZOO_HEAP_SIZE: 512
    volumes:
      - zookeeper_data:/bitnami/zookeeper
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─────────────────────────── Kafka ───────────────────────────────
  kafka:
    image: bitnami/kafka:3.6
    container_name: kafka
    networks:
      - flight-net
    ports:
      - "9092:9092"
      - "9093:9093"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 4
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_LOG_RETENTION_HOURS: 24
      KAFKA_CFG_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_CFG_MESSAGE_MAX_BYTES: 10485760
      KAFKA_CFG_REPLICA_FETCH_MAX_BYTES: 10485760
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_HEAP_OPTS: "-Xmx1g -Xms512m"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ──────────────────── Kafka Topic Init ───────────────────────────
  kafka-init:
    image: bitnami/kafka:3.6
    container_name: kafka-init
    networks:
      - flight-net
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topic: flight-events"
        kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --create \
          --if-not-exists \
          --topic flight-events \
          --partitions 4 \
          --replication-factor 1 \
          --config retention.ms=86400000 \
          --config max.message.bytes=10485760
        echo "Topic created successfully."
        kafka-topics.sh --bootstrap-server kafka:9092 --describe --topic flight-events
    restart: "no"

  # ─────────────────────── HDFS Namenode ───────────────────────────
  hdfs-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-namenode
    networks:
      - flight-net
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      CLUSTER_NAME: flightcluster
      CORE_CONF_fs_defaultFS: hdfs://hdfs-namenode:9000
      CORE_CONF_hadoop_http_staticuser_user: root
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: "false"
    volumes:
      - hdfs_namenode:/hadoop/dfs/name
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9870/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ─────────────────────── HDFS Datanode ───────────────────────────
  hdfs-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-datanode
    networks:
      - flight-net
    ports:
      - "9864:9864"
    depends_on:
      hdfs-namenode:
        condition: service_healthy
    environment:
      CORE_CONF_fs_defaultFS: hdfs://hdfs-namenode:9000
      CORE_CONF_hadoop_http_staticuser_user: root
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_datanode_address: 0.0.0.0:9866
      HDFS_CONF_dfs_datanode_http_address: 0.0.0.0:9864
      SERVICE_PRECONDITION: "hdfs-namenode:9870"
    volumes:
      - hdfs_datanode:/hadoop/dfs/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9864/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ─────────────────────── Spark Master ────────────────────────────
  spark-master:
    image: bitnami/spark:3.5
    container_name: spark-master
    networks:
      - flight-net
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_CONF_spark_sql_shuffle_partitions: 200
      SPARK_CONF_spark_serializer: org.apache.spark.serializer.KryoSerializer
      SPARK_CONF_spark_hadoop_fs_defaultFS: hdfs://hdfs-namenode:9000
    volumes:
      - ./src:/opt/spark-apps/src:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─────────────────────── Spark Worker 1 ──────────────────────────
  spark-worker-1:
    image: bitnami/spark:3.5
    container_name: spark-worker-1
    networks:
      - flight-net
    ports:
      - "8081:8081"
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: 4
      SPARK_WORKER_MEMORY: 8g
      SPARK_WORKER_WEBUI_PORT: 8081
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_CONF_spark_hadoop_fs_defaultFS: hdfs://hdfs-namenode:9000
    volumes:
      - ./src:/opt/spark-apps/src:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────── Spark Worker 2 ──────────────────────────
  spark-worker-2:
    image: bitnami/spark:3.5
    container_name: spark-worker-2
    networks:
      - flight-net
    ports:
      - "8082:8082"
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: 4
      SPARK_WORKER_MEMORY: 8g
      SPARK_WORKER_WEBUI_PORT: 8082
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_CONF_spark_hadoop_fs_defaultFS: hdfs://hdfs-namenode:9000
    volumes:
      - ./src:/opt/spark-apps/src:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
